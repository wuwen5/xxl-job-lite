services:
  xxl-job-admin:
    depends_on:
      database:
        condition: service_healthy
    build:
      context: xxl-job-admin/
      dockerfile: Dockerfile
      no_cache: true
    environment:
      MANAGEMENT_SERVER_PORT: 9001
      SERVER_PORT: 8080
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:9001/actuator/health/readiness | grep -q '\"status\":\"UP\"'" ]
      interval: 5s
      timeout: 3s
      retries: 30
    ports:
      - "8080:8080"
      - "9001:9001"
    networks:
      - xxl-job-network

  executor-sample:
    depends_on:
      xxl-job-admin:
        condition: service_healthy
    build:
      context: xxl-job-executor-samples/xxl-job-executor-sample-springboot/
      dockerfile: Dockerfile
      no_cache: true
    environment:
      SERVER_PORT: 8081
      XXL_JOB_ADMIN_ADDRESSES: http://xxl-job-admin:8080
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8081 | grep -q 'running'" ]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - xxl-job-network

networks:
  xxl-job-network:
    driver: bridge
