version: '3'

services:
  mysql:
    image: gcr.io/ml-pipeline/mysql:8.0.26
    environment:
      MYSQL_ROOT_PASSWORD: root_pwd
      MYSQL_DATABASE: xxl_job
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./doc/db/tables_xxl_job.sql:/docker-entrypoint-initdb.d/tables_xxl_job.sql:ro
    ports:
      - "3306:3306"
      - "33060:33060"
    networks:
      - xxl-job-network
  xxl-job-admin:
    depends_on:
      mysql:
        condition: service_healthy
    build:
      context: xxl-job-admin/
      dockerfile: Dockerfile
      no_cache: true
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root_pwd
      MANAGEMENT_SERVER_PORT: 9001
      SERVER_PORT: 8080
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:9001/actuator/health/readiness | grep -q '\"status\":\"UP\"'" ]
      interval: 5s
      timeout: 3s
      retries: 30
    ports:
      - "8080:8080"
      - "9001:9001"
    networks:
      - xxl-job-network
  executor-sample: 
    depends_on:
      xxl-job-admin:
        condition: service_healthy
    build:
      context: xxl-job-executor-samples/xxl-job-executor-sample-springboot/
      dockerfile: Dockerfile
      no_cache: true
    environment:
      SERVER_PORT: 8081
      XXL_JOB_ADMIN_ADDRESSES: http://xxl-job-admin:8080/xxl-job-admin
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8081 | grep -q 'running'" ]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - xxl-job-network

  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    volumes:
      - ./e2e:/e2e
    working_dir: /e2e
    command: bash -c "npm install && npx playwright test"
    depends_on:
      xxl-job-admin:
        condition: service_healthy
      executor-sample:
        condition: service_healthy
    networks:
      - xxl-job-network

networks:
  xxl-job-network:
    driver: bridge
