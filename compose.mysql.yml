services:
  database:
    image: gcr.io/ml-pipeline/mysql:8.0.26
    environment:
      MYSQL_ROOT_PASSWORD: root_pwd
      MYSQL_DATABASE: xxl_job
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./doc/db/tables_xxl_job.sql:/docker-entrypoint-initdb.d/tables_xxl_job.sql:ro
    networks:
      - xxl-job-network

  xxl-job-admin:
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root_pwd
